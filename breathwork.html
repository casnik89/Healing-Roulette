  <!--Breath-Work guide circle-->

  <section class="breathwork">
    <div class="breath-text" id="breath-text">
        Choose the breath-work style that serves you in this moment.
    </div>
    <div class="instruct"></div>

    <button class="breath-circle" id="breath-circle" aria-label="Breathing guide">
        <span class="breath-label" id="breath-label"></span>
    </button>

    <!--Options at bottom-->

    <div class="breath-options">
        
<label class="breath-option">
                <input type="radio" name="breath-style" value="calm">
                For Calm
            </label>

            <label class="breath-option">
                <input type="radio" name="breath-style" value="anxiety">
                For Anxiety
            </label>

            <label class="breath-option">
                <input type="radio" name="breath-style" value="anger">
                Anger
            </label>

            <label class="breath-option">
                <input type="radio" name="breath-style" value="478">
                4-7-8 Breathing
            </label>
    </div>
</section>
    <script src="breathwork.js" defer></script>
